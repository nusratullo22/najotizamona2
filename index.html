<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najoti Zamona - Доруҳои Гиёҳӣ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --green-dark: #1a4a1a;
    --green-mid: #2d7a2d;
    --green-light: #4caf50;
    --gold: #c8a020;
    --gold-light: #f0c040;
    --cream: #f9f5ec;
    --white: #ffffff;
    --text: #1a2a1a;
    --text-light: #4a6a4a;
    --blue-accent: #1a4a7a;
    --shadow: 0 8px 40px rgba(0,0,0,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ===== WHATSAPP FLOATING ===== */
  .whatsapp-float {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 12px;
    background: #25d366;
    color: white;
    padding: 14px 22px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    box-shadow: 0 6px 30px rgba(37,211,102,0.5);
    transition: all 0.3s;
    animation: pulse 2s infinite;
  }
  .whatsapp-float:hover {
    background: #1da851;
    transform: scale(1.05);
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 6px 30px rgba(37,211,102,0.5); }
    50% { box-shadow: 0 6px 50px rgba(37,211,102,0.8); }
  }
  .whatsapp-float svg { width: 24px; height: 24px; fill: white; }

  /* ===== HEADER ===== */
  header {
    background: linear-gradient(135deg, var(--green-dark) 0%, #0d2d0d 100%);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
    text-decoration: none;
  }
  .logo-img {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    object-fit: contain;
    background: white;
    padding: 4px;
    box-shadow: 0 0 0 3px var(--gold);
  }
  .logo-text h1 {
    font-family: 'Playfair Display', serif;
    color: var(--gold-light);
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 1px;
  }
  .logo-text p {
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  nav { display: flex; gap: 8px; }
  nav a {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
  }
  nav a:hover { background: rgba(255,255,255,0.15); color: white; }

  /* ===== HERO ===== */
  .hero {
    background: linear-gradient(135deg, #0d2d0d 0%, #1a4a1a 40%, #0a3060 100%);
    min-height: 85vh;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 70% 50%, rgba(200,160,32,0.12) 0%, transparent 70%);
  }
  /* 3D floating orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    animation: float 8s ease-in-out infinite;
  }
  .orb1 { width: 400px; height: 400px; background: var(--green-light); top: -100px; right: -100px; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: var(--gold); bottom: -50px; left: 10%; animation-delay: 3s; }
  .orb3 { width: 200px; height: 200px; background: var(--blue-accent); top: 30%; left: 30%; animation-delay: 1.5s; }
  @keyframes float {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  .hero-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 30px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
    position: relative;
    z-index: 2;
  }
  .hero-text h2 {
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    font-weight: 900;
    color: white;
    line-height: 1.1;
    margin-bottom: 20px;
  }
  .hero-text h2 span { color: var(--gold-light); }
  .hero-text p {
    color: rgba(255,255,255,0.8);
    font-size: 18px;
    line-height: 1.7;
    margin-bottom: 36px;
  }
  .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color: var(--green-dark);
    padding: 16px 32px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    font-size: 16px;
    box-shadow: 0 6px 30px rgba(200,160,32,0.4);
    transition: all 0.3s;
    transform: perspective(400px) rotateX(0deg);
  }
  .btn-primary:hover {
    transform: perspective(400px) rotateX(-5deg) translateY(-3px);
    box-shadow: 0 12px 40px rgba(200,160,32,0.6);
  }
  .btn-secondary {
    border: 2px solid rgba(255,255,255,0.4);
    color: white;
    padding: 16px 32px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    transition: all 0.3s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.1); border-color: white; }

  .hero-logo-display {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .logo-3d-wrap {
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: spin3d 12s linear infinite;
    box-shadow:
      0 0 60px rgba(76,175,80,0.4),
      inset 0 0 60px rgba(200,160,32,0.1);
  }
  .logo-3d-wrap img {
    width: 240px;
    height: 240px;
    object-fit: contain;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
    animation: float 5s ease-in-out infinite;
  }
  @keyframes spin3d {
    0% { box-shadow: 0 0 60px rgba(76,175,80,0.4), -20px 0 40px rgba(200,160,32,0.3); }
    50% { box-shadow: 0 0 80px rgba(200,160,32,0.5), 20px 0 40px rgba(76,175,80,0.3); }
    100% { box-shadow: 0 0 60px rgba(76,175,80,0.4), -20px 0 40px rgba(200,160,32,0.3); }
  }

  /* ===== STATS BAR ===== */
  .stats-bar {
    background: white;
    padding: 24px 30px;
    box-shadow: var(--shadow);
  }
  .stats-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    text-align: center;
  }
  .stat-item { padding: 16px; }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--green-mid);
  }
  .stat-label { color: var(--text-light); font-size: 13px; margin-top: 4px; }

  /* ===== SECTION TITLES ===== */
  .section-title {
    text-align: center;
    margin-bottom: 50px;
  }
  .section-title .tag {
    display: inline-block;
    background: rgba(76,175,80,0.1);
    color: var(--green-mid);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .section-title h2 {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--green-dark);
    margin-bottom: 14px;
  }
  .section-title p { color: var(--text-light); max-width: 600px; margin: 0 auto; font-size: 16px; }

  /* ===== PRODUCTS ===== */
  .products-section {
    padding: 80px 30px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .filter-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 40px;
  }
  .filter-btn {
    padding: 8px 20px;
    border-radius: 50px;
    border: 2px solid var(--green-light);
    background: transparent;
    color: var(--green-mid);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--green-mid);
    color: white;
    border-color: var(--green-mid);
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
  }
  .product-card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
    cursor: pointer;
    display: none;
  }
  .product-card.show { display: block; }
  .product-card:hover {
    transform: perspective(1000px) rotateX(-3deg) rotateY(2deg) translateY(-10px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .product-img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
  }
  .product-body { padding: 24px; }
  .product-category {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green-light);
    margin-bottom: 8px;
  }
  .product-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--green-dark);
    margin-bottom: 10px;
  }
  .product-desc {
    color: var(--text-light);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .product-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .product-tag {
    background: rgba(76,175,80,0.1);
    color: var(--green-mid);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }
  .product-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 16px;
    border-top: 1px solid #f0f0f0;
  }
  .product-price {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--gold);
  }
  .add-to-cart {
    background: var(--green-mid);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .add-to-cart:hover { background: var(--green-dark); transform: scale(1.05); }

  /* ===== CART ===== */
  .cart-icon {
    position: fixed;
    top: 100px;
    right: 20px;
    background: var(--green-dark);
    color: white;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 999;
    box-shadow: var(--shadow);
    font-size: 22px;
    transition: all 0.3s;
  }
  .cart-icon:hover { transform: scale(1.1); background: var(--gold); }
  .cart-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: red;
    color: white;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cart-modal {
    display: none;
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 400px;
    background: white;
    z-index: 10000;
    box-shadow: -10px 0 40px rgba(0,0,0,0.2);
    overflow-y: auto;
    padding: 30px;
  }
  .cart-modal.open { display: block; }
  .cart-modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--green-dark);
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cart-close {
    background: none;
    border: none;
    font-size: 28px;
    cursor: pointer;
    color: var(--text-light);
  }
  .cart-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .cart-item-emoji { font-size: 36px; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-weight: 600; font-size: 15px; color: var(--green-dark); }
  .cart-item-price { color: var(--gold); font-weight: 700; font-size: 14px; }
  .cart-item-qty {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid #ddd;
    background: white;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .qty-btn:hover { background: var(--green-mid); color: white; border-color: var(--green-mid); }
  .cart-total {
    background: var(--cream);
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
  }
  .cart-total-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 14px;
  }
  .cart-total-row.total { font-weight: 700; font-size: 18px; color: var(--green-dark); }
  .checkout-btn {
    width: 100%;
    background: linear-gradient(135deg, #25d366, #1da851);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .checkout-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,211,102,0.4); }

  /* ===== PRODUCT MODAL ===== */
  .product-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 10001;
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
  }
  .product-modal.open { display: flex; }
  .modal-content {
    background: white;
    border-radius: 24px;
    max-width: 700px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 40px;
    position: relative;
  }
  .modal-close-btn {
    position: absolute;
    top: 20px; right: 20px;
    background: #f5f5f5;
    border: none;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
  }
  .modal-emoji { font-size: 100px; text-align: center; margin-bottom: 20px; }
  .modal-name {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--green-dark);
    margin-bottom: 16px;
  }
  .modal-section { margin-bottom: 20px; }
  .modal-section h4 {
    font-weight: 700;
    color: var(--green-mid);
    margin-bottom: 8px;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .modal-section p { color: var(--text-light); line-height: 1.7; }
  .diseases-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .disease-tag {
    background: rgba(76,175,80,0.1);
    color: var(--green-dark);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
  }
  .usage-steps { list-style: none; counter-reset: steps; }
  .usage-steps li {
    counter-increment: steps;
    padding: 8px 0 8px 36px;
    position: relative;
    color: var(--text-light);
    border-bottom: 1px solid #f5f5f5;
  }
  .usage-steps li::before {
    content: counter(steps);
    position: absolute;
    left: 0;
    top: 8px;
    background: var(--green-mid);
    color: white;
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }
  .modal-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid #f0f0f0;
  }
  .modal-price {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--gold);
  }
  .modal-add-btn {
    background: var(--green-mid);
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-add-btn:hover { background: var(--green-dark); }

  /* ===== HOW TO USE ===== */
  .how-section {
    background: linear-gradient(135deg, var(--green-dark), #0d2d0d);
    padding: 80px 30px;
  }
  .how-inner { max-width: 1200px; margin: 0 auto; }
  .how-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    margin-top: 50px;
  }
  .how-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.3s;
    transform: perspective(800px) rotateX(0deg);
  }
  .how-card:hover {
    background: rgba(255,255,255,0.15);
    transform: perspective(800px) rotateX(-5deg) translateY(-8px);
  }
  .how-num {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 900;
    color: var(--gold-light);
    opacity: 0.3;
    line-height: 1;
    margin-bottom: 16px;
  }
  .how-icon { font-size: 40px; margin-bottom: 16px; }
  .how-title { color: white; font-size: 17px; font-weight: 700; margin-bottom: 10px; }
  .how-desc { color: rgba(255,255,255,0.65); font-size: 14px; line-height: 1.6; }
  .how-section .section-title .tag { color: var(--gold-light); background: rgba(200,160,32,0.2); }
  .how-section .section-title h2 { color: white; }
  .how-section .section-title p { color: rgba(255,255,255,0.7); }

  /* ===== WHY US ===== */
  .why-section { padding: 80px 30px; background: white; }
  .why-inner { max-width: 1200px; margin: 0 auto; }
  .why-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .why-card {
    padding: 32px;
    border-radius: 20px;
    border: 2px solid #eee;
    transition: all 0.3s;
  }
  .why-card:hover {
    border-color: var(--green-light);
    transform: translateY(-6px);
    box-shadow: 0 12px 40px rgba(76,175,80,0.15);
  }
  .why-icon { font-size: 48px; margin-bottom: 20px; }
  .why-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--green-dark); margin-bottom: 12px; }
  .why-desc { color: var(--text-light); line-height: 1.7; }

  /* ===== FOOTER ===== */
  footer {
    background: #0a1a0a;
    color: rgba(255,255,255,0.7);
    padding: 50px 30px 30px;
    text-align: center;
  }
  footer .logo-text h1 { color: var(--gold-light); margin-bottom: 12px; text-align: center; }
  footer p { font-size: 14px; line-height: 1.7; margin-bottom: 20px; }
  footer a { color: var(--gold-light); text-decoration: none; }

  /* ===== OVERLAY ===== */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 9998;
  }
  .overlay.open { display: block; }

  /* ===== CART ANIMATION ===== */
  .cart-anim {
    position: fixed;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--green-light);
    z-index: 99999;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    opacity: 1;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green-dark);
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-weight: 600;
    font-size: 14px;
    z-index: 99999;
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
